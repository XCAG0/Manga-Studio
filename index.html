<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' http://localhost:5000 http://127.0.0.1:5000 http://localhost:8765 http://127.0.0.1:8765 https://unpkg.com https://cdn.jsdelivr.net https://tessdata.projectnaptha.com https://*.supabase.co; worker-src 'self' blob:;">
  <title>Manga Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app-loader" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    ">
    <img src="/logo.png" alt="Manga Studio" style="width: 120px; height: 120px; margin-bottom: 2rem; opacity: 0.9;" />
    <h1 style="color: #fff; font-size: 2rem; margin-bottom: 1rem; font-family: system-ui, -apple-system, sans-serif;">
      Manga Studio</h1>
    <div style="
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #e94560;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      "></div>
    <p
      style="color: rgba(255, 255, 255, 0.6); margin-top: 2rem; font-size: 0.9rem; font-family: system-ui, -apple-system, sans-serif;">
      Loading...</p>
  </div>

  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <div id="root"></div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease';
          setTimeout(() => loader.remove(), 500);
        }
      }, 1000);
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
